name: Rust
on:
  # releases (incl. tests + build) for main are handled by release.yml;
  # this workflow is the CI signal for pull requests
  pull_request:
    branches: [ "main" ]
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y gcc-multilib wget gnupg software-properties-common git libbpf-dev musl-tools
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 22 all
        sudo update-alternatives --install /usr/bin/clang clang /usr/lib/llvm-22/bin/clang 100
        sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/lib/llvm-22/bin/clang++ 100
        sudo update-alternatives --set clang /usr/lib/llvm-22/bin/clang
        sudo update-alternatives --set clang++ /usr/lib/llvm-22/bin/clang++
        sudo update-alternatives --install /usr/bin/llvm-strip llvm-strip /usr/lib/llvm-22/bin/llvm-strip 100
        sudo update-alternatives --set llvm-strip /usr/lib/llvm-22/bin/llvm-strip
    - name: Install musl target
      run: rustup target add x86_64-unknown-linux-musl
    - name: Run tests
      run: cargo test --verbose
    - name: Build
      run: |
        cargo build --release --target x86_64-unknown-linux-musl
    - name: Upload xdp_loader artifact
      uses: actions/upload-artifact@v7
      with:
        archive: false
        name: xdp_loader
        path: ./target/x86_64-unknown-linux-musl/release/xdp-loader
    - name: Upload bpf object artifact
      uses: actions/upload-artifact@v7
      with:
        archive: false
        name: minecraft_filter.o
        path: ./xdp/minecraft_filter.o
