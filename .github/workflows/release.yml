name: Release
on:
  push:
    branches: [ "main" ]
# needed to push the version-bump commit and to create the GitHub release
permissions:
  contents: write
env:
  CARGO_TERM_COLOR: always
# serialize releases so two pushes can not race on the version/tag
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y gcc-multilib wget gnupg software-properties-common git libbpf-dev musl-tools
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 22 all
        sudo update-alternatives --install /usr/bin/clang clang /usr/lib/llvm-22/bin/clang 100
        sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/lib/llvm-22/bin/clang++ 100
        sudo update-alternatives --set clang /usr/lib/llvm-22/bin/clang
        sudo update-alternatives --set clang++ /usr/lib/llvm-22/bin/clang++
        sudo update-alternatives --install /usr/bin/llvm-strip llvm-strip /usr/lib/llvm-22/bin/llvm-strip 100
        sudo update-alternatives --set llvm-strip /usr/lib/llvm-22/bin/llvm-strip
    - name: Install musl target
      run: rustup target add x86_64-unknown-linux-musl
    - name: Read version
      id: version
      run: |
        VERSION=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
        echo "current=$VERSION" >> "$GITHUB_OUTPUT"
    - name: Skip if release already exists
      id: check
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if gh release view "v${{ steps.version.outputs.current }}" >/dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "Release v${{ steps.version.outputs.current }} already exists, skipping."
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Run tests
      if: steps.check.outputs.exists == 'false'
      run: cargo test --verbose
    - name: Build
      if: steps.check.outputs.exists == 'false'
      # the binary embeds CARGO_PKG_VERSION at compile time, so building
      # before the bump makes it report the version it is released under
      run: cargo build --release --target x86_64-unknown-linux-musl
    - name: Create release
      if: steps.check.outputs.exists == 'false'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "v${{ steps.version.outputs.current }}" \
          target/x86_64-unknown-linux-musl/release/xdp-loader \
          xdp/minecraft_filter.o \
          --title "v${{ steps.version.outputs.current }}" \
          --generate-notes
    - name: Bump patch version
      if: steps.check.outputs.exists == 'false'
      run: |
        IFS=. read -r MAJOR MINOR PATCH <<< "${{ steps.version.outputs.current }}"
        NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
        sed -i -E "0,/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"/s//version = \"$NEXT\"/" Cargo.toml
        sed -i -E "/^name = \"xdp-loader\"/{n;s/^version = \".*\"/version = \"$NEXT\"/}" Cargo.lock
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git commit -am "chore: release v${{ steps.version.outputs.current }}, bump to v$NEXT [skip ci]"
        git push
